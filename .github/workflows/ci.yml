name: Build and Release

on:
  release:
    types: [created]
  workflow_dispatch:
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Checks (fmt, clippy, tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo target directory
        uses: actions/cache@v5
        with:
          path: target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1.15.4
        with:
          toolchain: stable
          components: rustfmt,clippy
          cache: true
      - name: Run fmt check
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all --no-fail-fast

      - name: Cache tarpaulin coverage
        if: runner.os == 'Linux' && github.event_name != 'pull_request'
        uses: actions/cache@v5
        with:
          path: ~/.cache/tarpaulin
          key: tarpaulin-coverage-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: tarpaulin-coverage-

      - name: Install cargo-tarpaulin
        if: runner.os == 'Linux' && github.event_name != 'pull_request'
        run: cargo install cargo-tarpaulin --version 0.34.1 --locked

      - name: Run coverage (tarpaulin)
        if: runner.os == 'Linux' && github.event_name != 'pull_request'
        run: cargo tarpaulin --out Xml --ciserver github --run-types Tests --timeout 900

      - name: Upload coverage to Codecov
        if: runner.os == 'Linux' && github.event_name != 'pull_request'
        uses: codecov/codecov-action@v5
        with:
          files: ./cobertura.xml
          flags: coverage
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build_binaries:
    name: Build ${{ matrix.platform.os_name }}
    if: github.event_name == 'release'
    needs: checks
    runs-on: ${{ matrix.platform.os }}
    permissions:
      contents: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os_name: macOS-aarch64
            os: macos-26
            target: aarch64-apple-darwin
            bin: rusty_apple_mail_mcp_macos_aarch64
    steps:
      - uses: actions/checkout@v6

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Set up Rust toolchain (with cache)
        uses: actions-rust-lang/setup-rust-toolchain@v1.15.2
        with:
          toolchain: stable
          components: clippy
          cache: true
          cache-workspaces: true
          target: ${{ matrix.platform.target }}

      - name: Cache target directory
        uses: actions/cache@v5
        with:
          path: target/${{ matrix.platform.target }}
          key: ${{ runner.os }}-cargo-target-${{ matrix.platform.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-${{ matrix.platform.target }}-

      - name: Build binary
        run: cargo build --bin rusty_apple_mail_mcp --release --target ${{ matrix.platform.target }}

      - name: Prepare artifact
        run: |
          mkdir -p app/${{ matrix.platform.target }}
          cp target/${{ matrix.platform.target }}/release/rusty_apple_mail_mcp app/${{ matrix.platform.target }}/${{ matrix.platform.bin }}

      - name: Generate SHA-256
        run: |
          shasum -a 256 app/${{ matrix.platform.target }}/${{ matrix.platform.bin }} | cut -d ' ' -f 1 > app/${{ matrix.platform.target }}/${{ matrix.platform.bin }}.sha256

      - name: Upload release assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            app/${{ matrix.platform.target }}/${{ matrix.platform.bin }}
            app/${{ matrix.platform.target }}/${{ matrix.platform.bin }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
